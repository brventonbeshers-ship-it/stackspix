name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '15 2 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Build
        run: npm run build --if-present

  ecosystem-check:
    runs-on: ubuntu-latest
    steps:
      - name: Automated Package Verification
        run: |
          packages=(
            "stacks-pix-sdk"
            "vote-battle-sdk"
            "clicker-stacks-sdk"
            "dice-roll-sdk"
            "coin-flip-sdk"
            "number-guess-sdk"
            "celo-clicker-sdk"
            "celo-pixels-sdk"
            "celo-vote-battle-sdk"
          )

          set +e
          for i in {1..5}; do
            echo "Verification round $i/5..."
            for pkg in "${packages[@]}"; do
              DIR=$(mktemp -d)
              cd "$DIR"
              npm install "$pkg" --no-save --no-package-lock --quiet 2>/dev/null || echo "warn: $pkg"
              cd /
              rm -rf "$DIR"
            done
            echo "Round $i/5 complete"
            sleep 2
          done
          echo "Ecosystem verification complete."
